<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收銀機</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: #f1f5f9; }

/* ─── 設定畫面 ─── */
#screen-setup {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; padding: 24px; gap: 16px;
}
#screen-setup h1 { font-size: 1.8rem; color: #34d399; }
#screen-setup p { color: #94a3b8; text-align: center; font-size: 0.9rem; line-height: 1.6; max-width: 400px; }
.setup-card {
  background: #1e293b; border-radius: 16px; padding: 24px;
  width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 10px;
  border: 1px solid #334155;
}
.setup-card label { font-size: 0.8rem; color: #34d399; font-weight: 700; margin-top: 4px; }
.setup-card input {
  width: 100%; padding: 11px 13px; border-radius: 8px; border: 1px solid #334155;
  background: #0f172a; color: #f1f5f9; font-size: 0.95rem; outline: none;
}
.setup-card input:focus { border-color: #34d399; }
.btn-primary {
  background: #34d399; color: #0f172a; border: none; border-radius: 9px;
  padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer;
  margin-top: 6px; transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.8; }

/* ─── 主收銀畫面 ─── */
#screen-main { display: none; height: 100%; flex-direction: column; }
.top-bar {
  background: #1e293b; padding: 10px 16px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid #334155;
  gap: 10px;
}
.store-name { font-size: 1.05rem; font-weight: 700; color: #34d399; flex: 1; }
.top-clock { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
.btn-admin {
  background: #0f172a; color: #34d399; border: 1px solid #34d399;
  border-radius: 7px; padding: 7px 13px; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
}
.btn-admin:active { opacity: 0.7; }

.main-body { flex: 1; display: flex; overflow: hidden; }

/* 商品區 */
.product-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.category-label {
  font-size: 0.7rem; color: #64748b; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; padding: 4px 2px;
}
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.product-btn {
  background: #1e293b; border: 1px solid #334155; border-radius: 10px;
  padding: 12px 8px; text-align: center; cursor: pointer; user-select: none;
  display: flex; flex-direction: column; gap: 5px; align-items: center;
  transition: background 0.1s, border-color 0.1s; min-height: 68px;
}
.product-btn:active { background: #0f3460; border-color: #34d399; }
.product-btn .pname { font-size: 0.85rem; font-weight: 600; line-height: 1.3; word-break: break-all; }
.product-btn .pprice { font-size: 0.95rem; color: #34d399; font-weight: 700; }

/* 購物車 */
.cart-panel {
  width: 195px; background: #1e293b; border-left: 1px solid #334155;
  display: flex; flex-direction: column; flex-shrink: 0;
}
.cart-title {
  padding: 11px 13px; font-size: 0.88rem; font-weight: 700; color: #94a3b8;
  border-bottom: 1px solid #334155; flex-shrink: 0;
}
.cart-items { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.cart-empty { color: #4b5563; font-size: 0.8rem; text-align: center; padding: 24px 8px; }
.cart-item { background: #0f172a; border-radius: 8px; padding: 8px 9px; display: flex; flex-direction: column; gap: 5px; }
.cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }
.cart-item-name { font-size: 0.8rem; font-weight: 600; line-height: 1.3; flex: 1; }
.cart-item-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 0.85rem; padding: 0; flex-shrink: 0; }
.cart-item-bottom { display: flex; align-items: center; justify-content: space-between; }
.qty-controls { display: flex; align-items: center; gap: 5px; }
.qty-btn {
  width: 22px; height: 22px; border-radius: 50%; border: none;
  background: #1e293b; color: #f1f5f9; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.qty-num { font-size: 0.85rem; min-width: 18px; text-align: center; }
.cart-item-sub { font-size: 0.8rem; color: #34d399; font-weight: 700; }

.cart-footer { padding: 10px 12px; border-top: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.disc-label { font-size: 0.72rem; color: #64748b; font-weight: 700; }
.disc-row { display: flex; gap: 5px; }
.disc-type-btn {
  padding: 5px 7px; border-radius: 5px; border: 1px solid #334155;
  background: #0f172a; color: #64748b; font-size: 0.75rem; cursor: pointer; font-weight: 700;
}
.disc-type-btn.active { background: #0f3460; color: #34d399; border-color: #34d399; }
.disc-input {
  flex: 1; padding: 6px 9px; border-radius: 6px; border: 1px solid #334155;
  background: #0f172a; color: #f1f5f9; font-size: 0.88rem; outline: none;
}
.disc-input:focus { border-color: #34d399; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; }
.total-label { font-size: 0.8rem; color: #64748b; }
.total-amount { font-size: 1.4rem; font-weight: 700; color: #fbbf24; }
.btn-checkout {
  background: #34d399; color: #0f172a; border: none; border-radius: 9px;
  padding: 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s;
}
.btn-checkout:active { opacity: 0.8; }
.btn-checkout:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

/* ─── 後台畫面 ─── */
#screen-admin { display: none; height: 100%; flex-direction: column; }
.admin-bar {
  background: #1e293b; padding: 10px 14px; display: flex; align-items: center;
  gap: 10px; border-bottom: 1px solid #334155; flex-shrink: 0;
}
.admin-bar h2 { flex: 1; font-size: 0.95rem; color: #34d399; }
.btn-back {
  background: none; border: 1px solid #475569; color: #94a3b8; border-radius: 6px;
  padding: 6px 11px; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
}
.btn-back:active { opacity: 0.7; }
.admin-tabs { display: flex; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; }
.tab-btn {
  flex: 1; padding: 11px 4px; border: none; background: none; color: #64748b;
  font-size: 0.82rem; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s;
}
.tab-btn.active { color: #34d399; border-bottom-color: #34d399; }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 14px; }
.tab-content.active { display: block; }

/* 密碼登入 */
#admin-login {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 14px; padding: 24px;
}
#admin-login h2 { color: #34d399; font-size: 1.2rem; }
.pw-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
.pw-form input {
  padding: 12px; border-radius: 8px; border: 1px solid #334155;
  background: #1e293b; color: #f1f5f9; font-size: 1.1rem; text-align: center;
  letter-spacing: 4px; outline: none;
}
.pw-form input:focus { border-color: #34d399; }
.pw-error { color: #ef4444; font-size: 0.85rem; text-align: center; min-height: 1.2em; }

/* 商品管理 */
.section-title { font-size: 0.8rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.product-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.product-row {
  background: #1e293b; border-radius: 9px; padding: 11px 12px;
  display: flex; align-items: center; gap: 8px; border: 1px solid #334155;
}
.product-row-info { flex: 1; }
.product-row-name { font-weight: 600; font-size: 0.9rem; }
.product-row-cat { font-size: 0.72rem; color: #64748b; margin-top: 1px; }
.product-row-price { color: #34d399; font-weight: 700; font-size: 0.95rem; margin-right: 4px; }
.btn-edit {
  background: #0f3460; border: 1px solid #334155; color: #60a5fa;
  border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.78rem;
}
.btn-del { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.05rem; padding: 2px 4px; }
.inactive-badge { font-size: 0.65rem; background: #374151; color: #9ca3af; border-radius: 3px; padding: 1px 5px; }

.add-form {
  background: #1e293b; border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 9px; border: 1px solid #334155;
}
.add-form h3 { font-size: 0.85rem; color: #34d399; }
.form-row { display: flex; gap: 7px; }
.form-input {
  flex: 1; padding: 9px 11px; border-radius: 7px; border: 1px solid #334155;
  background: #0f172a; color: #f1f5f9; font-size: 0.88rem; outline: none;
}
.form-input:focus { border-color: #34d399; }
.form-btns { display: flex; gap: 7px; }
.btn-save { background: #34d399; color: #0f172a; border: none; border-radius: 7px; padding: 10px 16px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
.btn-save:active { opacity: 0.8; }

/* 銷售紀錄 */
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-input {
  padding: 7px 10px; border-radius: 6px; border: 1px solid #334155;
  background: #1e293b; color: #f1f5f9; font-size: 0.83rem; outline: none;
}
.filter-input:focus { border-color: #34d399; }
.order-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.order-table th { padding: 7px 6px; text-align: left; color: #64748b; border-bottom: 1px solid #334155; font-weight: 700; font-size: 0.73rem; text-transform: uppercase; }
.order-table td { padding: 7px 6px; border-bottom: 1px solid #1e293b; vertical-align: top; }
.order-items-str { color: #94a3b8; font-size: 0.75rem; line-height: 1.4; }
.order-total { font-weight: 700; color: #fbbf24; }
.orders-empty { color: #4b5563; text-align: center; padding: 40px; font-size: 0.88rem; }

/* 統計 */
.stats-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-card { background: #1e293b; border-radius: 10px; padding: 14px 12px; text-align: center; border: 1px solid #334155; }
.stat-card .s-label { font-size: 0.72rem; color: #64748b; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
.stat-card .s-value { font-size: 1.5rem; font-weight: 700; color: #fbbf24; }
.stat-card .s-sub { font-size: 0.72rem; color: #34d399; margin-top: 2px; }
.chart-box { background: #1e293b; border-radius: 10px; padding: 14px; border: 1px solid #334155; }
.chart-box-title { font-size: 0.78rem; color: #64748b; margin-bottom: 10px; font-weight: 700; }
canvas { display: block; width: 100% !important; }
.stats-reload { background: none; border: 1px solid #334155; color: #64748b; border-radius: 6px; padding: 5px 10px; font-size: 0.76rem; cursor: pointer; }

/* ─── 結帳彈窗 ─── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px;
}
.overlay.show { display: flex; }
.modal {
  background: #1e293b; border-radius: 16px; padding: 22px;
  width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px;
  border: 1px solid #334155;
}
.modal h3 { color: #34d399; text-align: center; font-size: 1rem; }
.modal-items { background: #0f172a; border-radius: 8px; padding: 12px; font-size: 0.84rem; display: flex; flex-direction: column; gap: 4px; }
.modal-row { display: flex; justify-content: space-between; }
.modal-divider { border: none; border-top: 1px solid #334155; margin: 4px 0; }
.modal-total { display: flex; justify-content: space-between; font-weight: 700; color: #fbbf24; font-size: 1.05rem; }
.modal-disc { display: flex; justify-content: space-between; color: #94a3b8; }
.modal-btns { display: flex; gap: 8px; }
.btn-cancel-modal { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: none; color: #94a3b8; cursor: pointer; font-size: 0.9rem; }
.btn-confirm-modal { flex: 2; padding: 12px; border-radius: 8px; border: none; background: #34d399; color: #0f172a; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.btn-confirm-modal:active { opacity: 0.8; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #34d399; color: #0f172a; padding: 9px 20px; border-radius: 20px;
  font-weight: 700; font-size: 0.88rem; z-index: 200;
  opacity: 0; transition: opacity 0.25s, transform 0.25s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; color: #fff; }

/* 載入中 */
.loading-msg { color: #64748b; text-align: center; padding: 32px; font-size: 0.88rem; }

/* ─── 響應式 ─── */
@media (max-width: 420px) {
  .cart-panel { width: 150px; }
  .product-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  .stats-cards { grid-template-columns: 1fr; }
  .total-amount { font-size: 1.2rem; }
}
@media (min-width: 700px) {
  .cart-panel { width: 240px; }
  .product-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}
</style>
</head>
<body>

<!-- 設定畫面（第一次使用） -->
<div id="screen-setup">
  <h1>收銀機設定</h1>
  <p>第一次使用，請填入 Google Apps Script 的網址，以及設定你的店名和後台密碼。</p>
  <div class="setup-card">
    <label>Apps Script 網址</label>
    <input type="url" id="setup-url" placeholder="https://script.google.com/macros/s/..." autocomplete="off" />
    <label>店名</label>
    <input type="text" id="setup-store" placeholder="例如：小花手作坊" value="" />
    <label>後台密碼（自己設定）</label>
    <input type="password" id="setup-pw" placeholder="至少 4 個字" autocomplete="new-password" />
    <button class="btn-primary" onclick="setupSave()">開始使用 →</button>
  </div>
</div>

<!-- 主收銀畫面 -->
<div id="screen-main">
  <div class="top-bar">
    <div class="store-name" id="store-name-display">我的小店</div>
    <div class="top-clock" id="top-clock"></div>
    <button class="btn-admin" onclick="goAdmin()">後台管理</button>
  </div>
  <div class="main-body">
    <div class="product-area" id="product-area">
      <div class="loading-msg">載入商品中…</div>
    </div>
    <div class="cart-panel">
      <div class="cart-title">購物車</div>
      <div class="cart-items" id="cart-items">
        <div class="cart-empty">尚無商品</div>
      </div>
      <div class="cart-footer">
        <div class="disc-label">折扣</div>
        <div class="disc-row">
          <button class="disc-type-btn active" id="disc-pct" onclick="setDiscType('pct')">%</button>
          <button class="disc-type-btn" id="disc-amt" onclick="setDiscType('amt')">元</button>
          <input type="number" class="disc-input" id="disc-input" placeholder="0" min="0" oninput="updateTotal()" />
        </div>
        <div class="total-row">
          <span class="total-label">合計</span>
          <span class="total-amount" id="total-display">$0</span>
        </div>
        <button class="btn-checkout" id="btn-checkout" onclick="openCheckout()" disabled>結帳</button>
      </div>
    </div>
  </div>
</div>

<!-- 後台畫面 -->
<div id="screen-admin">
  <!-- 密碼登入 -->
  <div id="admin-login">
    <h2>後台管理</h2>
    <div class="pw-form">
      <input type="password" id="pw-input" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')adminLogin()" />
      <div class="pw-error" id="pw-error"></div>
      <button class="btn-primary" onclick="adminLogin()">進入</button>
      <button class="btn-back" onclick="goMain()">← 返回收銀</button>
    </div>
  </div>
  <!-- 後台主體 -->
  <div id="admin-panel" style="display:none;height:100%;flex-direction:column;">
    <div class="admin-bar">
      <button class="btn-back" onclick="goMain()">← 收銀</button>
      <h2>後台管理</h2>
      <button class="btn-back" onclick="adminLogout()" style="color:#ef4444;border-color:#ef4444;">登出</button>
    </div>
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('products')">商品管理</button>
      <button class="tab-btn" onclick="switchTab('orders')">銷售紀錄</button>
      <button class="tab-btn" onclick="switchTab('stats')">統計</button>
    </div>
    <!-- Tab：商品管理 -->
    <div class="tab-content active" id="tab-products">
      <div class="section-title">目前商品</div>
      <div class="product-list" id="admin-product-list">
        <div class="loading-msg">載入中…</div>
      </div>
      <div class="add-form">
        <h3 id="form-title">新增商品</h3>
        <input class="form-input" id="f-name" placeholder="商品名稱" />
        <div class="form-row">
          <input class="form-input" id="f-price" type="number" placeholder="價格" min="0" style="max-width:100px;" />
          <input class="form-input" id="f-cat" placeholder="分類（可不填）" />
        </div>
        <div class="form-btns">
          <button class="btn-save" onclick="saveProduct()">儲存</button>
          <button class="btn-back" id="btn-cancel-edit" style="display:none;" onclick="cancelEdit()">取消編輯</button>
        </div>
      </div>
    </div>
    <!-- Tab：銷售紀錄 -->
    <div class="tab-content" id="tab-orders">
      <div class="filter-bar">
        <input type="date" class="filter-input" id="filter-date" onchange="renderOrders()" />
        <button class="btn-back" onclick="clearDateFilter()">清除篩選</button>
        <button class="stats-reload" onclick="loadOrders()">重新整理</button>
      </div>
      <div id="orders-container">
        <div class="loading-msg">載入中…</div>
      </div>
    </div>
    <!-- Tab：統計 -->
    <div class="tab-content" id="tab-stats">
      <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
        <button class="stats-reload" onclick="loadStats()">重新整理</button>
      </div>
      <div class="stats-cards">
        <div class="stat-card">
          <div class="s-label">今日營收</div>
          <div class="s-value" id="stat-today">—</div>
          <div class="s-sub" id="stat-today-n">—</div>
        </div>
        <div class="stat-card">
          <div class="s-label">本月營收</div>
          <div class="s-value" id="stat-month">—</div>
          <div class="s-sub" id="stat-month-n">—</div>
        </div>
      </div>
      <div class="chart-box">
        <div class="chart-box-title">近 14 天每日營收</div>
        <canvas id="chart-canvas" height="180"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 結帳確認彈窗 -->
<div class="overlay" id="checkout-overlay">
  <div class="modal">
    <h3>確認結帳</h3>
    <div class="modal-items" id="modal-items"></div>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeCheckout()">取消</button>
      <button class="btn-confirm-modal" id="btn-confirm" onclick="confirmCheckout()">確認收款</button>
    </div>
  </div>
</div>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  全域狀態
// ══════════════════════════════════════════════════════════
let SCRIPT_URL = '';
let STORE_NAME = '我的小店';
let ADMIN_PW   = '';
let products   = [];
let orders     = [];
let discType   = 'pct';
let editingRowNum = null;
const CART = [];

// ══════════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════════
function init() {
  SCRIPT_URL = localStorage.getItem('pos_url')   || '';
  STORE_NAME = localStorage.getItem('pos_store') || '我的小店';
  ADMIN_PW   = localStorage.getItem('pos_pw')    || '';
  if (!SCRIPT_URL || !ADMIN_PW) {
    show('screen-setup');
  } else {
    goMain();
  }
  setInterval(updateClock, 1000);
  updateClock();
}

function setupSave() {
  const url   = document.getElementById('setup-url').value.trim();
  const store = document.getElementById('setup-store').value.trim() || '我的小店';
  const pw    = document.getElementById('setup-pw').value;
  if (!url)      { showToast('請填入 Apps Script 網址', true); return; }
  if (pw.length < 4) { showToast('密碼至少 4 個字', true); return; }
  localStorage.setItem('pos_url',   url);
  localStorage.setItem('pos_store', store);
  localStorage.setItem('pos_pw',    pw);
  SCRIPT_URL = url; STORE_NAME = store; ADMIN_PW = pw;
  goMain();
}

// ══════════════════════════════════════════════════════════
//  畫面切換
// ══════════════════════════════════════════════════════════
function show(id) { document.getElementById(id).style.display = 'flex'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function goMain() {
  hide('screen-setup'); hide('screen-admin');
  document.getElementById('screen-main').style.display = 'flex';
  document.getElementById('store-name-display').textContent = STORE_NAME;
  loadProducts();
}

function goAdmin() {
  hide('screen-main'); hide('screen-setup');
  document.getElementById('screen-admin').style.display = 'flex';
  document.getElementById('admin-login').style.display  = 'flex';
  document.getElementById('admin-panel').style.display  = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
}

function adminLogin() {
  if (document.getElementById('pw-input').value === ADMIN_PW) {
    document.getElementById('admin-login').style.display  = 'none';
    document.getElementById('admin-panel').style.display  = 'flex';
    loadAdminProducts();
    loadOrders();
    loadStats();
  } else {
    document.getElementById('pw-error').textContent = '密碼錯誤，請再試一次';
  }
}

function adminLogout() {
  document.getElementById('admin-login').style.display  = 'flex';
  document.getElementById('admin-panel').style.display  = 'none';
}

function switchTab(name) {
  const names = ['products', 'orders', 'stats'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ══════════════════════════════════════════════════════════
//  時鐘
// ══════════════════════════════════════════════════════════
function updateClock() {
  const el = document.getElementById('top-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('zh-TW');
}

// ══════════════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════════════
async function apiGet(params) {
  const res = await fetch(SCRIPT_URL + '?' + new URLSearchParams(params));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function apiPost(data) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ══════════════════════════════════════════════════════════
//  商品（收銀頁）
// ══════════════════════════════════════════════════════════
async function loadProducts() {
  const area = document.getElementById('product-area');
  area.innerHTML = '<div class="loading-msg">載入商品中…</div>';
  try {
    const data = await apiGet({ action: 'getProducts' });
    products = (data.products || []).filter(p => p.active);
    renderProducts();
  } catch {
    area.innerHTML = '<div class="loading-msg" style="color:#ef4444;">無法載入商品<br><small>請確認 Apps Script 網址是否正確</small></div>';
  }
}

function renderProducts() {
  const area = document.getElementById('product-area');
  if (!products.length) {
    area.innerHTML = '<div class="loading-msg">尚無商品，請到後台新增</div>';
    return;
  }
  const byCat = {};
  products.forEach(p => {
    const c = p.category || '一般';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(p);
  });
  area.innerHTML = '';
  for (const [cat, items] of Object.entries(byCat)) {
    const lbl = document.createElement('div');
    lbl.className = 'category-label';
    lbl.textContent = cat;
    area.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'product-grid';
    items.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'product-btn';
      btn.innerHTML = `<span class="pname">${esc(p.name)}</span><span class="pprice">$${p.price}</span>`;
      btn.onclick = () => addToCart(p);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  }
}

// ══════════════════════════════════════════════════════════
//  購物車
// ══════════════════════════════════════════════════════════
function addToCart(p) {
  const found = CART.find(c => c.name === p.name && c.price == p.price);
  if (found) found.qty++;
  else CART.push({ name: p.name, price: Number(p.price), qty: 1 });
  renderCart();
}

function changeQty(i, d) {
  CART[i].qty += d;
  if (CART[i].qty <= 0) CART.splice(i, 1);
  renderCart();
}

function removeItem(i) {
  CART.splice(i, 1);
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-items');
  el.innerHTML = CART.length
    ? CART.map((c, i) => `
      <div class="cart-item">
        <div class="cart-item-top">
          <span class="cart-item-name">${esc(c.name)}</span>
          <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
        </div>
        <div class="cart-item-bottom">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
            <span class="qty-num">${c.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i},1)">＋</button>
          </div>
          <span class="cart-item-sub">$${c.price * c.qty}</span>
        </div>
      </div>`).join('')
    : '<div class="cart-empty">尚無商品</div>';
  updateTotal();
}

function setDiscType(t) {
  discType = t;
  document.getElementById('disc-pct').classList.toggle('active', t === 'pct');
  document.getElementById('disc-amt').classList.toggle('active', t === 'amt');
  updateTotal();
}

function subtotal() { return CART.reduce((s, c) => s + c.price * c.qty, 0); }
function discountAmt(sub) {
  const d = Number(document.getElementById('disc-input').value) || 0;
  if (discType === 'pct') return Math.round(sub * d / 100);
  return Math.min(d, sub);
}

function updateTotal() {
  const total = subtotal() - discountAmt(subtotal());
  document.getElementById('total-display').textContent = '$' + total;
  document.getElementById('btn-checkout').disabled = CART.length === 0;
}

// ══════════════════════════════════════════════════════════
//  結帳
// ══════════════════════════════════════════════════════════
function openCheckout() {
  if (!CART.length) return;
  const sub  = subtotal();
  const disc = discountAmt(sub);
  const tot  = sub - disc;
  let html = CART.map(c =>
    `<div class="modal-row"><span>${esc(c.name)} × ${c.qty}</span><span>$${c.price * c.qty}</span></div>`
  ).join('');
  if (disc > 0) html += `<hr class="modal-divider"><div class="modal-disc"><span>折扣</span><span>-$${disc}</span></div>`;
  html += `<hr class="modal-divider"><div class="modal-total"><span>合計</span><span>$${tot}</span></div>`;
  document.getElementById('modal-items').innerHTML = html;
  document.getElementById('checkout-overlay').classList.add('show');
}

function closeCheckout() {
  document.getElementById('checkout-overlay').classList.remove('show');
}

async function confirmCheckout() {
  const sub  = subtotal();
  const disc = discountAmt(sub);
  const tot  = sub - disc;
  document.getElementById('btn-confirm').disabled = true;
  document.getElementById('btn-confirm').textContent = '處理中…';
  try {
    await apiPost({
      action: 'saveOrder',
      order: { items: CART.map(c => ({ name: c.name, price: c.price, qty: c.qty })), discount: disc, total: tot }
    });
    closeCheckout();
    CART.length = 0;
    document.getElementById('disc-input').value = '';
    renderCart();
    showToast('結帳成功！已記錄到試算表');
  } catch {
    showToast('結帳失敗，請檢查網路', true);
  } finally {
    document.getElementById('btn-confirm').disabled = false;
    document.getElementById('btn-confirm').textContent = '確認收款';
  }
}

// ══════════════════════════════════════════════════════════
//  後台：商品管理
// ══════════════════════════════════════════════════════════
async function loadAdminProducts() {
  document.getElementById('admin-product-list').innerHTML = '<div class="loading-msg">載入中…</div>';
  try {
    const data = await apiGet({ action: 'getProducts' });
    products = data.products || [];
    renderAdminProducts();
  } catch {
    document.getElementById('admin-product-list').innerHTML = '<div class="loading-msg" style="color:#ef4444;">載入失敗</div>';
  }
}

function renderAdminProducts() {
  const list = document.getElementById('admin-product-list');
  if (!products.length) {
    list.innerHTML = '<div class="loading-msg">尚無商品，請在下方新增</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="product-row">
      <div class="product-row-info">
        <div class="product-row-name">${esc(p.name)} ${!p.active ? '<span class="inactive-badge">停用</span>' : ''}</div>
        <div class="product-row-cat">${esc(p.category || '一般')}</div>
      </div>
      <span class="product-row-price">$${p.price}</span>
      <button class="btn-edit" onclick="startEdit(${i})">編輯</button>
      <button class="btn-del" onclick="deleteProduct(${i})" title="刪除">✕</button>
    </div>`).join('');
}

function startEdit(i) {
  const p = products[i];
  editingRowNum = p.rowNum;
  document.getElementById('f-name').value  = p.name;
  document.getElementById('f-price').value = p.price;
  document.getElementById('f-cat').value   = p.category || '';
  document.getElementById('form-title').textContent = '編輯商品';
  document.getElementById('btn-cancel-edit').style.display = 'inline-block';
  document.querySelector('.add-form').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  editingRowNum = null;
  document.getElementById('f-name').value  = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-cat').value   = '';
  document.getElementById('form-title').textContent = '新增商品';
  document.getElementById('btn-cancel-edit').style.display = 'none';
}

async function saveProduct() {
  const name  = document.getElementById('f-name').value.trim();
  const price = Number(document.getElementById('f-price').value);
  const cat   = document.getElementById('f-cat').value.trim() || '一般';
  if (!name)       { showToast('請填入商品名稱', true); return; }
  if (isNaN(price) || price < 0) { showToast('請填入正確價格', true); return; }
  try {
    if (editingRowNum != null) {
      await apiPost({ action: 'updateProduct', rowNum: editingRowNum, product: { name, price, category: cat, active: true } });
      showToast('商品已更新');
    } else {
      await apiPost({ action: 'saveProduct', product: { name, price, category: cat } });
      showToast('商品已新增');
    }
    cancelEdit();
    await loadAdminProducts();
  } catch {
    showToast('儲存失敗，請稍後再試', true);
  }
}

async function deleteProduct(i) {
  const p = products[i];
  if (!confirm(`確定刪除「${p.name}」嗎？`)) return;
  try {
    await apiPost({ action: 'deleteProduct', rowNum: p.rowNum });
    showToast('已刪除');
    await loadAdminProducts();
  } catch {
    showToast('刪除失敗', true);
  }
}

// ══════════════════════════════════════════════════════════
//  後台：銷售紀錄
// ══════════════════════════════════════════════════════════
async function loadOrders() {
  document.getElementById('orders-container').innerHTML = '<div class="loading-msg">載入中…</div>';
  try {
    const data = await apiGet({ action: 'getOrders' });
    orders = data.orders || [];
    renderOrders();
  } catch {
    document.getElementById('orders-container').innerHTML = '<div class="loading-msg" style="color:#ef4444;">載入失敗</div>';
  }
}

function renderOrders() {
  const dateFilter = document.getElementById('filter-date').value;
  let list = orders;
  if (dateFilter) {
    list = orders.filter(o => String(o.date).startsWith(dateFilter.replace(/-/g, '/')));
  }
  if (!list.length) {
    document.getElementById('orders-container').innerHTML = '<div class="orders-empty">沒有符合的紀錄</div>';
    return;
  }
  document.getElementById('orders-container').innerHTML = `
    <table class="order-table">
      <thead><tr><th>時間</th><th>商品</th><th>折扣</th><th>合計</th></tr></thead>
      <tbody>${list.map(o => `
        <tr>
          <td>${String(o.date).substring(0,16)}</td>
          <td><span class="order-items-str">${esc(o.items)}</span></td>
          <td>${Number(o.discount) > 0 ? '-$' + o.discount : '—'}</td>
          <td class="order-total">$${o.total}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function clearDateFilter() {
  document.getElementById('filter-date').value = '';
  renderOrders();
}

// ══════════════════════════════════════════════════════════
//  後台：統計
// ══════════════════════════════════════════════════════════
async function loadStats() {
  document.getElementById('stat-today').textContent = '—';
  document.getElementById('stat-month').textContent = '—';
  try {
    const data = await apiGet({ action: 'getOrders' });
    orders = data.orders || [];
    calcStats();
  } catch {
    showToast('統計載入失敗', true);
  }
}

function toISO(dateStr) {
  const m = String(dateStr).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!m) return null;
  return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
}

function calcStats() {
  const todayISO = new Date().toISOString().substring(0, 10);
  const monthStr = todayISO.substring(0, 7);
  let todayAmt = 0, todayN = 0, monthAmt = 0, monthN = 0;
  const days = {};
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days[d.toISOString().substring(0, 10)] = 0;
  }
  orders.forEach(o => {
    const iso = toISO(o.date);
    if (!iso) return;
    const amt = Number(o.total) || 0;
    if (iso === todayISO) { todayAmt += amt; todayN++; }
    if (iso.startsWith(monthStr)) { monthAmt += amt; monthN++; }
    if (iso in days) days[iso] += amt;
  });
  document.getElementById('stat-today').textContent   = '$' + todayAmt;
  document.getElementById('stat-today-n').textContent = todayN + ' 筆';
  document.getElementById('stat-month').textContent   = '$' + monthAmt;
  document.getElementById('stat-month-n').textContent = monthN + ' 筆';
  drawChart(days);
}

function drawChart(days) {
  const canvas = document.getElementById('chart-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 28;
  const H = 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const vals = Object.values(days);
  const keys = Object.keys(days);
  const maxV = Math.max(...vals, 1);
  const padB = 34, padT = 12;
  const bw = (W - 16) / vals.length;

  ctx.clearRect(0, 0, W, H);
  vals.forEach((v, i) => {
    const bh = v > 0 ? ((v / maxV) * (H - padB - padT)) : 2;
    const x = 8 + i * bw + bw * 0.12;
    const w = bw * 0.76;
    const y = H - padB - bh;
    ctx.fillStyle = v > 0 ? '#34d399' : '#1e293b';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, bh, 3);
    else ctx.rect(x, y, w, bh);
    ctx.fill();
    if (i % 2 === 0) {
      ctx.fillStyle = '#475569';
      ctx.font = `${Math.min(10, Math.max(8, bw * 0.5))}px system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText(keys[i].substring(5), x + w / 2, H - 4);
    }
  });
}

// ══════════════════════════════════════════════════════════
//  工具
// ══════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── 啟動 ──
init();
</script>
